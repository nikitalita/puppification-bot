# fly.toml app configuration file generated for puppification-bot on 2026-04-30T20:26:31Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'puppification-bot'
primary_region = 'iad'

[build]

[deploy]
  strategy = 'immediate'

[env]
  HF_HOME = '/data/hf'
  NODE_ENV = 'production'
  SAVE_LOCATION = '/data/save'

[[mounts]]
  source = 'hf_cache'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
